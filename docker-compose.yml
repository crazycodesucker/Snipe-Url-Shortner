services:

  app:
    build: .

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://postgres:admin@db:5432/url_shortener

    depends_on:
      - db


  db:
    image: postgres:17

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: url_shortener

    ports:
      - "6969:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


volumes:
  postgres_data: